<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loose Cannon Magic 8 Ball</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>

    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --color-bg:      #ffc7ea;
      --color-black:   #0a0a0a;
      --color-cream:   #f5efe0;
      --color-ball:    #111111;

      --font-display:  'Bricolage Grotesque', sans-serif;
      --font-body:     'DM Sans', sans-serif;

      --ball-size:     min(320px, 62vw);
      --circle-size:   calc(var(--ball-size) * 0.43);
      --window-size:   calc(var(--ball-size) * 0.43);
    }

    /* ─────────────────────────────────────────
       RESET
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background-color: var(--color-bg);
      color: var(--color-black);
      font-family: var(--font-body);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 1.5rem 2.5rem;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .header {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────
       KEYFRAMES
    ───────────────────────────────────────── */

    /* Ball rests at top, bobs downward — never travels up into question */
    @keyframes ballFloat {
      0%   { transform: translateY(0px);   }
      100% { transform: translateY(22px); }
    }

    /* Cast shadow — opposite to float */
    /* Ball at rest (top) → soft wide shadow.  Ball low → tight dark shadow */
    @keyframes shadowPulse {
      0%   { transform: scaleX(1.25); opacity: 0.32; }
      100% { transform: scaleX(0.72); opacity: 0.50; }
    }

    /* Desktop hold — subtle rattle */
    @keyframes ballCharge {
      0%   { transform: translate(0,    0)    rotate(0deg);    }
      25%  { transform: translate(-3px, 1px)  rotate(-1deg);   }
      50%  { transform: translate(3px, -1px)  rotate(1deg);    }
      75%  { transform: translate(-2px, 2px)  rotate(-0.5deg); }
      100% { transform: translate(0,    0)    rotate(0deg);    }
    }

    /* Shake trigger */
    @keyframes ballShake {
      0%   { transform: translate(0,     0)    rotate(0deg);    }
      8%   { transform: translate(-12px, -6px) rotate(-4deg);   }
      16%  { transform: translate(11px,   5px) rotate(4deg);    }
      24%  { transform: translate(-9px,   7px) rotate(-3deg);   }
      32%  { transform: translate(10px,  -6px) rotate(3deg);    }
      40%  { transform: translate(-8px,   6px) rotate(-4deg);   }
      48%  { transform: translate(9px,   -7px) rotate(4deg);    }
      56%  { transform: translate(-11px,  4px) rotate(-3deg);   }
      64%  { transform: translate(8px,    5px) rotate(2deg);    }
      72%  { transform: translate(-6px,  -4px) rotate(-1.5deg); }
      80%  { transform: translate(5px,    3px) rotate(1deg);    }
      90%  { transform: translate(-2px,  -1px) rotate(-0.5deg); }
      100% { transform: translate(0,     0)    rotate(0deg);    }
    }

    /* Mic pulse rings */
    @keyframes micRing {
      0%   { transform: scale(0.85); opacity: 0.55; }
      100% { transform: scale(2.2);  opacity: 0;    }
    }

    /* ─────────────────────────────────────────
       BALL STAGE
    ───────────────────────────────────────── */
    .ball-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 1rem;
      width: 100%;
      position: relative;
    }

    .ball-float-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: top center;
    }

    /* Question is now its own body-level row */
    .question-above {
      width: 100%;
      max-width: 420px;
      padding: 0 1rem;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.5rem);
      text-align: center;
      line-height: 1.2;
      color: var(--color-black);
      opacity: 0;
      min-height: 2rem;
      margin-top: 1.25rem;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .question-above.visible { opacity: 1; }

    .ball-shadow {
      width: calc(var(--ball-size) * 0.72);
      height: 22px;
      margin-top: 18px;
      background: radial-gradient(
        ellipse at center,
        rgba(0,0,0,0.38) 0%,
        rgba(0,0,0,0.10) 50%,
        transparent 72%
      );
      border-radius: 50%;
      animation: shadowPulse 3s ease-in-out infinite alternate;
    }

    .ball {
      width: var(--ball-size);
      height: var(--ball-size);
      border-radius: 50%;
      /* Sphere gradient — offset focal point for 3D depth, matches canvas */
      background: radial-gradient(
        circle at 38% 35%,
        #444444 0%,
        #1e1e1e 25%,
        #000000 100%
      );
      position: relative;
      cursor: grab;
      user-select: none;
      overflow: hidden;
      animation: ballFloat 3s ease-in-out infinite alternate;
      /* Inset shadow darkens edges like canvas inset gradient */
      box-shadow:
        inset 6px 6px 40px rgba(255,255,255,0.06),
        inset -20px -20px 60px rgba(0,0,0,0.7);
    }

    .ball:active      { cursor: grabbing; }
    .ball.is-charging { animation: ballCharge 0.12s ease-in-out infinite; cursor: grabbing; }
    .ball.is-shaking  { animation: ballShake  0.6s  ease-in-out forwards; cursor: grabbing; }

    /* Specular highlight — elliptical, top-left, matching canvas */
    .ball::before {
      content: '';
      position: absolute;
      top: 12%; left: 14%;
      width: 32%; height: 18%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.22) 0%, transparent 70%);
      border-radius: 50%;
      transform: rotate(-20deg);
      pointer-events: none;
    }

    /* Edge darkening — mimics canvas inset shadow at perimeter */
    .ball::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(
        circle at 60% 65%,
        transparent 40%,
        rgba(0,0,0,0.45) 100%
      );
      pointer-events: none;
    }

    /* White circle — idle face */
    .ball-face {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: var(--circle-size);
      height: var(--circle-size);
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.12),
        0 0 0 1.5px rgba(0,0,0,0.08);
      z-index: 2;
    }

    .ball-eight {
      font-family: 'Arial Black', 'Bricolage Grotesque', sans-serif;
      font-weight: 900;
      font-size: calc(var(--ball-size) * 0.28);
      color: #0a0a0a;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
    }

    /* Blue answer window — hidden until reveal */
    .ball-window {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: var(--window-size);
      height: var(--window-size);
      background: #000;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      z-index: 3;
      /* Beveled inset ring matching the real toy */
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.06),
        inset 0 6px 24px rgba(0,0,0,0.9),
        inset 0 0 40px rgba(26,68,238,0.18);
    }

    /* SVG fills the full window circle */
    .answer-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Text overlaid on the SVG triangle, fitted to its center */
    .answer-text {
      position: absolute;
      top: 54%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(var(--ball-size) * 0.14);
      text-align: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: calc(var(--ball-size) * 0.034);
      color: #fff;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* ─────────────────────────────────────────
       INPUT AREA
    ───────────────────────────────────────── */
    .input-area {
      width: 100%;
      max-width: 460px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .input-label {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.15rem;
      text-align: center;
    }

    .input-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--color-cream);
      border-radius: 100px;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .question-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-black);
    }

    .question-input::placeholder { color: rgba(10,10,10,0.38); }

    .btn-mic {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 50%;
      background: transparent; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-black);
      opacity: 0.45;
      transition: opacity 0.2s ease;
    }
    .btn-mic:hover { opacity: 1; }
    .btn-mic:focus { outline: none; }

    .btn-submit {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--color-black); border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-cream);
      transition: transform 0.15s ease;
    }
    .btn-submit:hover  { transform: scale(1.07); }
    .btn-submit:active { transform: scale(0.95); }
    .btn-submit:focus  { outline: none; }
    .btn-submit:disabled {
      opacity: 0.25; cursor: default;
      transform: none; pointer-events: none;
    }

    /* ─────────────────────────────────────────
       SHAKE PROMPT
    ───────────────────────────────────────── */
    .shake-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .shake-prompt.visible { display: flex; }

    .shake-hint {
      font-family: var(--font-body);
      font-size: 0.82rem;
      opacity: 0.45;
      letter-spacing: 0.02em;
    }
    @media (hover: none) { .shake-hint { display: none; } }

    .btn-shake {
      margin-top: 0.25rem;
      padding: 0.7rem 2rem;
      border-radius: 100px;
      background: var(--color-black);
      color: var(--color-cream);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border: none; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .btn-shake:hover  { transform: scale(1.04); }
    .btn-shake:active { transform: scale(0.96); }
    .btn-shake:focus  { outline: none; }

    /* ─────────────────────────────────────────
       MIC OVERLAY
    ───────────────────────────────────────── */
    .mic-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--color-bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.5rem; padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .mic-overlay.active { opacity: 1; pointer-events: all; }

    .mic-pulse-wrapper {
      position: relative;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
    }

    .mic-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid var(--color-black);
      opacity: 0;
      animation: micRing 2s ease-out infinite;
    }
    .mic-ring:nth-child(2) { animation-delay: 0.55s; }
    .mic-ring:nth-child(3) { animation-delay: 1.10s; }

    .mic-icon-circle {
      position: relative; z-index: 2;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--color-black);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-bg);
    }

    .mic-live-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.4rem;
      text-align: center;
      max-width: 340px;
      min-height: 3.5rem;
      line-height: 1.3;
    }
    .mic-live-text.empty {
      opacity: 0.35;
      font-weight: 400;
      font-family: var(--font-body);
      font-size: 1rem;
    }

    .mic-cancel {
      font-family: var(--font-body);
      font-size: 0.85rem;
      opacity: 0.45;
      position: absolute; bottom: 2.5rem;
      cursor: pointer; letter-spacing: 0.02em;
    }
    .mic-cancel:hover { opacity: 0.8; }

    /* ─────────────────────────────────────────
       REVEAL & RESET ANIMATIONS
    ───────────────────────────────────────── */

    /* Shadow fades as ball approaches viewer */
    .ball-shadow { transition: opacity 0.4s ease; }

    /* ── Step 1: Wrapper zooms in (ball-float-wrapper) ── */
    @keyframes wrapperZoom {
      0%   { transform: scale(1); }
      100% { transform: scale(1.5); }
    }

    .ball-float-wrapper.is-zooming {
      animation: wrapperZoom 0.55s ease-out forwards;
    }

    /* ── Step 2: Face travels across sphere surface (sin/cos math baked in) ──
       X = sin(θ) × 160,  scaleX = cos(θ),  θ: 0° → 90° */
    @keyframes faceRotateBack {
      0%   { transform: translate(-50%, -50%) translateX(0)      scaleX(1.00); }
      20%  { transform: translate(-50%, -50%) translateX(-49px)  scaleX(0.95); }
      40%  { transform: translate(-50%, -50%) translateX(-94px)  scaleX(0.81); }
      60%  { transform: translate(-50%, -50%) translateX(-129px) scaleX(0.59); }
      80%  { transform: translate(-50%, -50%) translateX(-152px) scaleX(0.31); }
      100% { transform: translate(-50%, -50%) translateX(-160px) scaleX(0);    }
    }

    /* Window comes from right — same math, opposite direction */
    @keyframes windowRotateFront {
      0%   { transform: translate(-50%, -50%) translateX(160px)  scaleX(0);    }
      20%  { transform: translate(-50%, -50%) translateX(152px)  scaleX(0.31); }
      40%  { transform: translate(-50%, -50%) translateX(129px)  scaleX(0.59); }
      60%  { transform: translate(-50%, -50%) translateX(94px)   scaleX(0.81); }
      80%  { transform: translate(-50%, -50%) translateX(49px)   scaleX(0.95); }
      100% { transform: translate(-50%, -50%) translateX(0)      scaleX(1.00); }
    }

    .ball-face.rotating-back {
      animation: faceRotateBack 0.6s linear forwards;
    }

    .ball-window.rotating-front {
      opacity: 1 !important;
      animation: windowRotateFront 0.6s linear forwards;
    }

    /* ── Step 3: Answer text floats up ── */
    @keyframes textFloat {
      0%   { opacity: 0; transform: translate(-50%, -30%); }
      100% { opacity: 1; transform: translate(-50%, -50%); }
    }

    .answer-text.is-revealing {
      opacity: 0;
      animation: textFloat 0.8s ease-out forwards;
    }

    /* Question shown in shake prompt after submit */
    .submitted-question {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-style: italic;
      opacity: 0.6;
      text-align: center;
      max-width: 280px;
      line-height: 1.45;
    }

    /* ─────────────────────────────────────────
       RESULT PROMPT (Step C footer state)
    ───────────────────────────────────────── */
    .result-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .result-prompt.visible { display: flex; }

    .question-display {
      font-family: var(--font-body);
      font-size: 0.88rem;
      opacity: 0.5;
      font-style: italic;
      max-width: 280px;
      line-height: 1.45;
    }

    .result-buttons {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-share {
      padding: 0.7rem 2rem;
      border-radius: 100px;
      background: transparent;
      color: var(--color-black);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      border: 2px solid var(--color-black);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .btn-share:hover  { background: var(--color-black); color: var(--color-bg); transform: scale(1.04); }
    .btn-share:active { transform: scale(0.96); }
    .btn-share:focus  { outline: none; }

    .btn-share.loading { opacity: 0.5; pointer-events: none; }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .input-label { font-size: 1rem; }
    }

  </style>
</head>
<body>

  <!-- Capture zone: logo + question + ball — this gets screenshotted -->
  <div id="captureZone">

  <!-- Header -->
  <header class="header">
    <span class="logo">Loose Cannon Co.</span>
  </header>

  <!-- Question row — own dedicated space, ball cannot reach it -->
  <p class="question-above" id="questionAbove"></p>

  <!-- Ball -->
  <main class="ball-stage">
    <div class="ball-float-wrapper">
      <div class="ball" id="ball">
        <div class="ball-face">
          <span class="ball-eight">8</span>
        </div>
        <div class="ball-window" id="ballWindow">
          <svg class="answer-svg" viewBox="0 0 138 138" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="ambientGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="12"/>
              </filter>
              <filter id="triGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
              <!-- Ring gradient: dark top, blue-tinted bottom -->
              <linearGradient id="ringGrad" gradientUnits="userSpaceOnUse"
                              x1="0" y1="0" x2="0" y2="138">
                <stop offset="0%"   stop-color="#0d0d0d"/>
                <stop offset="55%"  stop-color="#0d0d0d"/>
                <stop offset="100%" stop-color="#1a35cc" stop-opacity="0.6"/>
              </linearGradient>
              <clipPath id="circleClip">
                <circle cx="69" cy="69" r="69"/>
              </clipPath>
            </defs>

            <g clip-path="url(#circleClip)">
              <!-- Black base -->
              <rect width="138" height="138" fill="#000"/>
              <!-- Ambient glow layer -->
              <polygon points="69,24 113,104 25,104"
                fill="#2255ff" opacity="0.65" filter="url(#ambientGlow)"/>
              <!-- Triangle with feathered edges -->
              <polygon points="69,24 113,104 25,104"
                fill="#1a44ee" filter="url(#triGlow)"/>
              <!-- Ring: sits on top, completely independent of the glow -->
              <circle cx="69" cy="69" r="64"
                fill="none"
                stroke="url(#ringGrad)"
                stroke-width="6"/>
            </g>
          </svg>
          <span class="answer-text" id="answerText"></span>
        </div>
      </div>
      <div class="ball-shadow"></div>
    </div>
  </main>

  </div><!-- /captureZone -->

  <!-- Footer -->
  <footer class="input-area">

    <!-- State A: question input -->
    <p class="input-label" id="inputLabel">Ask a yes or no question</p>
    <div class="input-row" id="inputRow">
      <input
        class="question-input"
        type="text"
        id="questionInput"
        placeholder="Will it all work out...?"
        autocomplete="off"
      />
      <button class="btn-mic" id="btnMic" aria-label="Dictate question">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="btn-submit" id="btnSubmit" aria-label="Submit question">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    <!-- State B: shake prompt -->
    <div class="shake-prompt" id="shakePrompt">
      <p class="input-label">Shake the ball</p>
      <p class="shake-hint">or hold &amp; release the ball</p>
      <button class="btn-shake" id="btnShake">Shake it</button>
    </div>

    <!-- State C: result -->
    <div class="result-prompt" id="resultPrompt">
      <div class="result-buttons">
        <button class="btn-share" id="btnShare">Share</button>
        <button class="btn-shake" id="btnReset">Ask Another</button>
      </div>
    </div>

  </footer>

  <!-- Mic Overlay -->
  <div class="mic-overlay" id="micOverlay">
    <div class="mic-pulse-wrapper">
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <div class="mic-icon-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </div>
    <p class="mic-live-text empty" id="micLiveText">Listening...</p>
    <span class="mic-cancel" id="micCancel">tap to cancel</span>
  </div>

  <script>
    // ── Elements ──
    const ball              = document.getElementById('ball');
    const ballFace          = document.getElementById('ballFace') || ball.querySelector('.ball-face');
    const ballShadow        = ball.parentElement.querySelector('.ball-shadow');
    const questionAbove     = document.getElementById('questionAbove');
    const inputLabel        = document.getElementById('inputLabel');
    const inputRow          = document.getElementById('inputRow');
    const shakePrompt       = document.getElementById('shakePrompt');
    const submittedQuestion = document.getElementById('submittedQuestion');
    const resultPrompt      = document.getElementById('resultPrompt');
    const questionDisplay   = document.getElementById('questionDisplay');
    const questionInput     = document.getElementById('questionInput');
    const btnSubmit         = document.getElementById('btnSubmit');
    const btnShake          = document.getElementById('btnShake');
    const btnReset          = document.getElementById('btnReset');
    const btnMic            = document.getElementById('btnMic');
    const micOverlay        = document.getElementById('micOverlay');
    const micLiveText       = document.getElementById('micLiveText');
    const micCancel         = document.getElementById('micCancel');
    const ballWindow        = document.getElementById('ballWindow');
    const answerText        = document.getElementById('answerText');

    // ── Answers (placeholders) ──
    const answers = [
      // Unhinged Yes
      'Bestie, absolutely',
      'The ancestors said go off',
      'Bold of you to ask but yes',
      'This is your sign, dummy',
      'Obviously. Keep up.',
      'The vibes confirm it',
      'Girl yes',
      'Do it before I change my mind',
      // Savage No
      'Hell Nah',
      'Not in this economy',
      'lol no',
      'Ask yo mama',
      'The audacity of this question',
      'My lawyer advised me not to answer',
      'Absolutely not and I\'m offended you asked',
      'No and seek help',
      // Chaos / Deflect
      'Put the bunny back in the box',
      'That\'s a you problem',
      'Ask again after therapy',
      'The ball is also confused',
      'Sir this is a Wendy\'s',
      'Consult a goat',
      'What is even real',
      'I don\'t get paid enough for this',
      // 4th Wall / Meta
      'Why are you asking a ball',
      'I\'m an 8 ball not a therapist',
      'Delete this question',
      'Even I know better than that',
      // LC Brand Nods
      'Only if it goes viral',
      'Loose Cannon says yes',
      'That\'s content',
      'Make it a reel',
    ];
    const randomAnswer = () => answers[Math.floor(Math.random() * answers.length)];

    // ── State ──
    let appState      = 'idle';
    let isHolding     = false;
    let lastShakeTime = 0;
    const SHAKE_THRESHOLD = 18;
    const SHAKE_COOLDOWN  = 2500;

    // ── Submit button gating ──
    btnSubmit.disabled = true;
    questionInput.addEventListener('input', () => {
      btnSubmit.disabled = questionInput.value.trim().length === 0;
    });

    // ── Submit question ──
    async function submitQuestion() {
      const q = questionInput.value.trim();
      if (!q || appState !== 'idle') return;
      appState = 'ready';
      await requestMotionPermission();

      // Blur input so iOS doesn't show "undo typing" on shake
      questionInput.blur();

      questionAbove.textContent = q;
      questionAbove.classList.add('visible');
      inputLabel.style.display = 'none';
      inputRow.style.display   = 'none';
      shakePrompt.classList.add('visible');
    }

    btnSubmit.addEventListener('click', submitQuestion);
    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitQuestion();
    });

    // ── iOS motion permission ──
    async function requestMotionPermission() {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const r = await DeviceMotionEvent.requestPermission();
          return r === 'granted';
        } catch { return false; }
      }
      return true;
    }

    // ── Trigger shake ──
    function triggerShake() {
      if (appState !== 'ready') return;
      appState = 'shaking';
      lastShakeTime = Date.now();
      ball.classList.remove('is-charging');
      ball.classList.add('is-shaking');
      ball.addEventListener('animationend', () => {
        ball.classList.remove('is-shaking');
        appState = 'revealed';
        showAnswer();
      }, { once: true });
    }

    function showAnswer() {
      answerText.textContent = randomAnswer();
      const wrapper = ball.closest('.ball-float-wrapper');

      // ── 1. Zoom ──
      wrapper.classList.add('is-zooming');
      ballShadow.style.opacity = '0';

      // ── 2. Turn (after zoom settles) ──
      setTimeout(() => {
        ballFace.classList.add('rotating-back');
        ballWindow.classList.add('rotating-front');

        // ── 3. Text reveal (after turn settles) ──
        setTimeout(() => {
          answerText.classList.add('is-revealing');

          // ── 4. Footer swap ──
          setTimeout(() => {
            shakePrompt.classList.remove('visible');
            resultPrompt.classList.add('visible');
          }, 1000);
        }, 800);
      }, 600);
    }

    function resetApp() {
      const wrapper = ball.closest('.ball-float-wrapper');
      wrapper.classList.remove('is-zooming');
      ballFace.classList.remove('rotating-back');
      ballFace.style.transform   = '';
      ballWindow.classList.remove('rotating-front');
      ballWindow.style.opacity   = '0';
      ballWindow.style.transform = '';
      answerText.classList.remove('is-revealing');
      answerText.textContent = '';
      ballShadow.style.opacity = '';

      questionAbove.classList.remove('visible');
      questionAbove.textContent = '';

      resultPrompt.classList.remove('visible');
      inputLabel.style.display = '';
      inputRow.style.display   = '';
      questionInput.value      = '';
      btnSubmit.disabled       = true;
      appState = 'idle';
    }

    btnReset.addEventListener('click', resetApp);

    async function handleShare() {
      const btnShare = document.getElementById('btnShare');
      btnShare.classList.add('loading');
      btnShare.textContent = 'Saving...';

      try {
        const zone   = document.getElementById('captureZone');
        const canvas = await html2canvas(zone, {
          backgroundColor: '#ffc7ea',
          scale: 2,
          useCORS: true,
          logging: false,
        });

        const cropHeight = Math.round(canvas.height * 0.88);
        const cropped    = document.createElement('canvas');
        cropped.width    = canvas.width;
        cropped.height   = cropHeight;
        cropped.getContext('2d').drawImage(canvas, 0, 0);

        cropped.toBlob(async (blob) => {
          const file = new File([blob], 'loose-cannon-8ball.png', { type: 'image/png' });

          if (navigator.share && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Loose Cannon Magic 8 Ball' });
          } else {
            const url = URL.createObjectURL(blob);
            const a   = document.createElement('a');
            a.href = url; a.download = 'loose-cannon-8ball.png'; a.click();
            URL.revokeObjectURL(url);
          }

          btnShare.classList.remove('loading');
          btnShare.textContent = 'Share';
        }, 'image/png');

      } catch (err) {
        console.error('Share error:', err);
        btnShare.classList.remove('loading');
        btnShare.textContent = 'Share';
      }
    }

    // ── Detect touch device for share vs download label ──
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const btnShare = document.getElementById('btnShare');
    btnShare.textContent = isTouchDevice ? 'Share' : 'Download Image';

    async function handleShare() {
      btnShare.classList.add('loading');
      btnShare.textContent = isTouchDevice ? 'Sharing...' : 'Saving...';

      try {
        // Ensure custom fonts are loaded before drawing
        await document.fonts.ready;

        const question = questionAbove.textContent || '';
        const answer   = (answerText.textContent || '').toUpperCase();

        const W = 1080, H = 1350;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');

        // ── Background ──
        ctx.fillStyle = '#ffc7ea';
        ctx.fillRect(0, 0, W, H);

        // ── Logo ──
        ctx.fillStyle = '#0a0a0a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.font = '800 38px "Bricolage Grotesque", sans-serif';
        // Manual letter spacing
        const logo = 'LOOSE  CANNON  CO.';
        ctx.fillText(logo, W / 2, 90);

        // ── Question (word-wrapped) ──
        ctx.font = '800 68px "Bricolage Grotesque", sans-serif';
        const qLines = wrapText(ctx, question, 880);
        const qStartY = 200;
        const qLineHeight = 80;
        qLines.forEach((line, i) => {
          ctx.fillText(line, W / 2, qStartY + i * qLineHeight);
        });

        // ── 8 Ball — positioned dynamically below the question ──
        const qEndY = qStartY + qLines.length * qLineHeight;
        const cx = W / 2;
        const R  = 320;
        const gap = 90;                              // breathing room
        const cy = qEndY + gap + R;                  // ball top sits gap px below question

        // Sphere with radial gradient — offset highlight matches website top-left
        const sphere = ctx.createRadialGradient(cx - 100, cy - 120, 30, cx, cy, R);
        sphere.addColorStop(0,   '#444444');
        sphere.addColorStop(0.25,'#1e1e1e');
        sphere.addColorStop(1,   '#000000');
        ctx.fillStyle = sphere;
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fill();

        // Inset shadow — bottom-right darkening like CSS inset box-shadow
        const inset = ctx.createRadialGradient(cx + 80, cy + 80, R * 0.3, cx, cy, R);
        inset.addColorStop(0,   'rgba(0,0,0,0)');
        inset.addColorStop(0.7, 'rgba(0,0,0,0)');
        inset.addColorStop(1,   'rgba(0,0,0,0.55)');
        ctx.fillStyle = inset;
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.fill();

        // Specular highlight — top-left ellipse matching website
        const hl = ctx.createRadialGradient(cx - 100, cy - 130, 0, cx - 100, cy - 130, 120);
        hl.addColorStop(0, 'rgba(255,255,255,0.20)');
        hl.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = hl;
        ctx.beginPath();
        ctx.ellipse(cx - 100, cy - 130, 120, 70, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // Inner black window
        const wR = 150;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(cx, cy, wR, 0, Math.PI * 2);
        ctx.fill();

        // Ambient blue glow (blurred triangle behind main triangle)
        ctx.save();
        ctx.shadowColor = 'rgba(34, 85, 255, 0.9)';
        ctx.shadowBlur = 40;
        ctx.fillStyle = '#2255ff';
        ctx.globalAlpha = 0.65;
        ctx.beginPath();
        ctx.moveTo(cx,       cy - 98);
        ctx.lineTo(cx + 96,  cy + 78);
        ctx.lineTo(cx - 96,  cy + 78);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Main blue triangle
        ctx.fillStyle = '#1a44ee';
        ctx.beginPath();
        ctx.moveTo(cx,       cy - 98);
        ctx.lineTo(cx + 96,  cy + 78);
        ctx.lineTo(cx - 96,  cy + 78);
        ctx.closePath();
        ctx.fill();

        // Ring — dark top, blue-tinted bottom, matching website SVG ring
        const ringGrad = ctx.createLinearGradient(0, cy - wR, 0, cy + wR);
        ringGrad.addColorStop(0,    '#0d0d0d');
        ringGrad.addColorStop(0.55, '#0d0d0d');
        ringGrad.addColorStop(1,    'rgba(26, 53, 204, 0.6)');
        ctx.strokeStyle = ringGrad;
        ctx.lineWidth = 9;
        ctx.beginPath();
        ctx.arc(cx, cy, wR - 4, 0, Math.PI * 2);
        ctx.stroke();

        // ── Answer text (centered in triangle) ──
        ctx.fillStyle = '#fff';
        ctx.font = '800 30px "Bricolage Grotesque", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const aLines = wrapText(ctx, answer, 110);
        const aStartY = cy + 18 - (aLines.length - 1) * 18;
        aLines.forEach((line, i) => {
          ctx.fillText(line, cx, aStartY + i * 36);
        });

        // ── Export ──
        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'loose-cannon-8ball.png', { type: 'image/png' });

          if (isTouchDevice && navigator.share && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Loose Cannon Magic 8 Ball' });
          } else {
            const url = URL.createObjectURL(blob);
            const a   = document.createElement('a');
            a.href = url;
            a.download = 'loose-cannon-8ball.png';
            a.click();
            URL.revokeObjectURL(url);
          }

          btnShare.classList.remove('loading');
          btnShare.textContent = isTouchDevice ? 'Share' : 'Download Image';
        }, 'image/png');

      } catch (err) {
        console.error('Share error:', err);
        btnShare.classList.remove('loading');
        btnShare.textContent = isTouchDevice ? 'Share' : 'Download Image';
      }
    }

    // Helper: word-wrap text on canvas
    function wrapText(ctx, text, maxWidth) {
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    document.getElementById('btnShare').addEventListener('click', handleShare);

    // ── Desktop: hold + release ──
    ball.addEventListener('mousedown', () => {
      if (appState !== 'ready') return;
      isHolding = true;
      ball.classList.add('is-charging');
    });

    document.addEventListener('mouseup', () => {
      if (!isHolding) return;
      isHolding = false;
      ball.classList.remove('is-charging');
      if (appState === 'ready') triggerShake();
    });

    // ── Mobile: tap ball ──
    ball.addEventListener('touchend', e => {
      e.preventDefault();
      if (appState === 'ready') triggerShake();
    });

    // ── Shake button fallback ──
    btnShake.addEventListener('click', () => triggerShake());

    // ── DeviceMotion ──
    window.addEventListener('devicemotion', e => {
      if (appState !== 'ready') return;
      const acc = e.accelerationIncludingGravity;
      if (!acc) return;
      const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
      const now = Date.now();
      if (mag > SHAKE_THRESHOLD && now - lastShakeTime > SHAKE_COOLDOWN) {
        triggerShake();
      }
    });

    // ── Speech recognition ──
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening  = false;

    if (SR) {
      recognition = new SR();
      recognition.continuous     = false;
      recognition.interimResults = true;
      recognition.lang           = 'en-US';

      recognition.onstart = () => {
        isListening = true;
        micLiveText.textContent = 'Listening...';
        micLiveText.classList.add('empty');
      };

      recognition.onresult = e => {
        const t = Array.from(e.results).map(r => r[0].transcript).join('');
        micLiveText.textContent = t;
        micLiveText.classList.remove('empty');
        questionInput.value = t;
        btnSubmit.disabled  = t.trim().length === 0;
      };

      recognition.onend  = () => { isListening = false; closeMicOverlay(); };
      recognition.onerror = e => {
        isListening = false;
        closeMicOverlay();
        if (e.error === 'not-allowed')
          alert('Microphone access denied. Allow mic permissions and try again.');
        else if (e.error !== 'aborted')
          alert('Voice input issue. Try typing instead!');
      };
    }

    function openMicOverlay() {
      micOverlay.classList.add('active');
      if (recognition) recognition.start();
    }

    function closeMicOverlay() {
      micOverlay.classList.remove('active');
      micLiveText.textContent = 'Listening...';
      micLiveText.classList.add('empty');
      if (recognition && isListening) { recognition.stop(); isListening = false; }
    }

    btnMic.addEventListener('click', () => {
      if (!SR) { alert("Voice input needs Chrome!"); return; }
      openMicOverlay();
    });

    micCancel.addEventListener('click', () => {
      questionInput.value = '';
      btnSubmit.disabled  = true;
      closeMicOverlay();
    });

  </script>
</body>
</html>
